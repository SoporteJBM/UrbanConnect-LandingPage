<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Inicia sesión en UrbanConnect para gestionar tu comunidad residencial." />
  <title>UrbanConnect | Iniciar sesión</title>
  <link rel="stylesheet" href="./assets/styles/global.css" />
  <link rel="stylesheet" href="./assets/styles/login.css" />
</head>

<body>
  <main class="page">
    <div class="cloud left"></div>
    <div class="cloud right"></div>

    <div class="route-line one"></div>
    <div class="route-line two"></div>

    <div class="float-card users">
      <img src="./assets/images/icon-users.png" alt="Usuarios" />
    </div>

    <div class="float-card shield">
      <img src="./assets/images/icon-shield.png" alt="Seguridad" />
    </div>

    <div class="float-card chat">
      <img src="./assets/images/icon-chat.png" alt="Mensajes" />
    </div>

    <section class="login-card">
      <a class="logo" href="index.html" aria-label="Volver a la página pública de UrbanConnect">
        <img
          src="./assets/images/logo-urbanconnect.png"
          alt="Logo UrbanConnect"
          class="logo-img"
        />

        <div class="brand">
          Urban<span>Connect</span>
        </div>
      </a>

      <h1>Iniciar sesión</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="login">Usuario</label>

          <div class="input-box">
            <span class="input-symbol">👤</span>
            <input
              type="text"
              id="login"
              name="login"
              autocomplete="username"
              placeholder="Ingresa tu usuario"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>

          <div class="input-box">
            <span class="input-symbol">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Ingresa tu contraseña"
              required
            />

            <button
              class="eye-icon"
              type="button"
              aria-label="Mostrar u ocultar contraseña"
              onclick="togglePassword()"
            ></button>
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" />
            Recordarme
          </label>

          <a id="forgotPassword" href="#loginMessage">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary">
          Iniciar sesión <span>→</span>
        </button>

        <p id="loginMessage" class="login-message" role="status" aria-live="polite"></p>

        <div class="divider">o</div>

        <button id="googleLogin" type="button" class="google-btn">
          <span class="google-g">G</span>
          Continuar con Google
        </button>

        <p class="register">
          ¿No tienes cuenta?
          <a href="registro.html">Regístrate</a>
        </p>
      </form>
    </section>

    <div class="secure">
      <img src="./assets/images/icon-shield.png" alt="Seguridad" />

      <div>
        <strong>Plataforma segura para tu comunidad</strong>
        Tus datos están protegidos
      </div>
    </div>

    <img
      src="./assets/images/city-background.png"
      alt="Ciudad UrbanConnect"
      class="city-img"
    />
  </main>

  <script src="./assets/scripts/login.js"></script>
</body>
</html>
